name: check

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run `npm run check`
        run: ./tests/docker/check/run.sh
